<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NPPE Diagnostic Quiz</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root {
    --bg: #f4f1ea;
    --paper: #fffdf7;
    --ink: #1a1a1a;
    --ink-soft: #555;
    --accent: #8b3a3a;       /* deep burgundy */
    --accent-soft: #c9a47a;  /* warm tan */
    --line: #d8d1c0;
    --back-bg: #faf3e0;
    --shadow: rgba(60, 40, 20, 0.12);
    --shadow-deep: rgba(60, 40, 20, 0.22);
    --correct: #2d6a2f;
    --correct-bg: #e6f0e2;
    --wrong: #a33;
    --wrong-bg: #f5e2e2;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { min-height: 100%; }
  body {
    background: var(--bg);
    background-image:
      radial-gradient(circle at 20% 30%, rgba(139, 58, 58, 0.04), transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(201, 164, 122, 0.06), transparent 50%);
    color: var(--ink);
    font-family: Georgia, 'Iowan Old Style', serif;
    padding: 24px 16px 60px;
    line-height: 1.5;
  }

  header {
    max-width: 760px;
    margin: 0 auto 16px;
    text-align: center;
  }
  h1 {
    font-family: 'Iowan Old Style', Georgia, serif;
    font-size: clamp(26px, 5vw, 38px);
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 4px;
  }
  h1 .accent { color: var(--accent); font-style: italic; }
  .subtitle {
    color: var(--ink-soft);
    font-size: 13px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .container {
    max-width: 760px;
    margin: 0 auto;
  }

  /* Progress */
  .progress-wrap {
    margin: 16px 0;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 1px 3px var(--shadow);
  }
  .progress-text {
    font-size: 13px;
    color: var(--ink-soft);
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }
  .progress-bar {
    flex: 1;
    height: 6px;
    background: var(--line);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.3s ease;
    width: 0;
  }

  /* Question card */
  .question {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 28px 32px;
    box-shadow:
      0 1px 2px var(--shadow),
      0 12px 28px -8px var(--shadow-deep);
    margin-bottom: 16px;
  }
  @media (max-width: 600px) {
    .question { padding: 20px 18px; }
  }

  .qmeta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .qnumber {
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
  }
  .qtype {
    font-size: 11px;
    letter-spacing: 0.5px;
    color: var(--ink-soft);
    font-style: italic;
  }

  .stem {
    font-size: clamp(15px, 2vw, 17px);
    font-weight: 500;
    line-height: 1.55;
    color: var(--ink);
    margin-bottom: 20px;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .option {
    display: flex;
    align-items: flex-start;
    padding: 12px 14px;
    border: 1px solid var(--line);
    border-radius: 4px;
    background: var(--paper);
    cursor: pointer;
    transition: all 0.15s ease;
    font-size: clamp(14px, 1.9vw, 15px);
    line-height: 1.5;
  }
  .option:hover:not(.locked) {
    border-color: var(--accent);
    background: #faf6ee;
  }
  .option-letter {
    font-weight: 700;
    color: var(--accent);
    margin-right: 12px;
    min-width: 20px;
    font-family: Georgia, serif;
  }
  .option.selected {
    border-color: var(--accent);
    background: #faf6ee;
  }
  .option.correct {
    border-color: var(--correct);
    background: var(--correct-bg);
  }
  .option.correct .option-letter { color: var(--correct); }
  .option.wrong {
    border-color: var(--wrong);
    background: var(--wrong-bg);
  }
  .option.wrong .option-letter { color: var(--wrong); }
  .option.locked { cursor: default; }
  .option.locked.dimmed { opacity: 0.55; }

  .feedback {
    margin-top: 18px;
    padding: 14px 16px;
    border-radius: 4px;
    border-left: 3px solid var(--accent);
    background: var(--back-bg);
    font-size: clamp(13px, 1.7vw, 14px);
    line-height: 1.55;
    white-space: pre-wrap;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback .verdict {
    font-weight: 700;
    margin-bottom: 8px;
    font-family: Georgia, serif;
    font-size: 14px;
    letter-spacing: 0.3px;
  }
  .feedback.correct { border-left-color: var(--correct); background: var(--correct-bg); }
  .feedback.correct .verdict { color: var(--correct); }
  .feedback.wrong { border-left-color: var(--wrong); background: var(--wrong-bg); }
  .feedback.wrong .verdict { color: var(--wrong); }

  /* Navigation */
  .nav {
    display: flex;
    gap: 10px;
    justify-content: space-between;
    align-items: center;
    margin-top: 20px;
    flex-wrap: wrap;
  }
  button {
    font-family: inherit;
    font-size: 14px;
    padding: 10px 18px;
    border: 1px solid var(--line);
    background: var(--paper);
    color: var(--ink);
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s ease;
    font-weight: 600;
  }
  button:hover:not(:disabled) {
    border-color: var(--accent);
    color: var(--accent);
  }
  button.primary {
    background: var(--accent);
    color: var(--paper);
    border-color: var(--accent);
  }
  button.primary:hover:not(:disabled) {
    background: #6e2d2d;
    color: var(--paper);
  }
  button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  /* Results */
  .results {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 32px;
    box-shadow:
      0 1px 2px var(--shadow),
      0 12px 28px -8px var(--shadow-deep);
    text-align: center;
    display: none;
  }
  .results.show { display: block; }
  .score-big {
    font-size: clamp(48px, 10vw, 72px);
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
    font-family: 'Iowan Old Style', Georgia, serif;
  }
  .score-label {
    font-size: 14px;
    color: var(--ink-soft);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 4px;
    margin-bottom: 24px;
  }
  .verdict-text {
    font-size: 16px;
    font-style: italic;
    color: var(--ink);
    margin-bottom: 24px;
    line-height: 1.6;
  }
  .breakdown {
    text-align: left;
    margin: 24px 0;
    padding: 20px;
    background: var(--back-bg);
    border-radius: 4px;
  }
  .breakdown h3 {
    font-size: 13px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
    font-weight: 600;
  }
  .breakdown-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    font-size: 14px;
    border-bottom: 1px solid var(--line);
  }
  .breakdown-row:last-child { border-bottom: none; }
  .breakdown-row .label { color: var(--ink-soft); }
  .breakdown-row .score {
    font-variant-numeric: tabular-nums;
    font-weight: 600;
  }
  .breakdown-row .score.good { color: var(--correct); }
  .breakdown-row .score.mid { color: #b08400; }
  .breakdown-row .score.weak { color: var(--wrong); }

  .review-link {
    display: inline-block;
    margin-top: 16px;
    color: var(--accent);
    text-decoration: underline;
    cursor: pointer;
    font-size: 14px;
  }
</style>
</head>
<body>

<header>
  <h1>NPPE <span class="accent">Diagnostic</span></h1>
  <p class="subtitle">15-question baseline · ~15 min</p>
</header>

<div class="container">

  <div class="progress-wrap" id="progressWrap">
    <span class="progress-text" id="progressText">Question 1 of 15</span>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <span class="progress-text" id="scoreText">Score: 0</span>
  </div>

  <div id="quizArea"></div>

  <div class="results" id="results">
    <div class="score-big" id="finalScore">0/15</div>
    <div class="score-label" id="finalPercent">0%</div>
    <div class="verdict-text" id="verdictText"></div>

    <div class="breakdown">
      <h3>Performance by Question Type</h3>
      <div id="typeBreakdown"></div>
    </div>

    <div class="breakdown">
      <h3>Performance by Topic Area</h3>
      <div id="topicBreakdown"></div>
    </div>

    <div style="margin-top: 24px;">
      <button class="primary" onclick="location.reload()">Take Quiz Again</button>
      <button onclick="document.getElementById('results').classList.remove('show'); document.getElementById('quizArea').style.display='block'; document.getElementById('progressWrap').style.display='flex'; showQuestion(0);">Review Answers</button>
    </div>
  </div>

</div>

<script id="dataScript" type="application/json">{"questions": [{"id": 1, "type": "Direct recall", "topic": "Professionalism", "stem": "Which of the following is NOT one of the defining characteristics of a profession?", "options": ["Possession of specialized knowledge acquired through extended education", "Service to the public in the public interest", "Guaranteed minimum income set by the regulatory body", "Self-governance under a code of ethics enforced by peers"], "answer": 2, "explanation": "The four hallmarks of a profession are: (1) specialized knowledge, (2) service to the public, (3) a code of ethics, and (4) self-regulation. Income guarantees are NOT a feature — professionals operate in markets and their fees are determined by negotiation, not the regulator. Watch for the word 'NOT' in the stem — it flips the logic."}, {"id": 2, "type": "Ethical scenario", "topic": "Ethics — Public Safety", "stem": "An engineer working for a manufacturer discovers that a product the company has been selling for two years has a design defect that could cause serious injury under certain conditions. The engineer raises the issue with management, but is told to keep quiet because a recall would be financially devastating. What is the engineer's MOST APPROPRIATE next step?", "options": ["Comply with management's direction — they have the authority to decide on recalls.", "Resign from the company quietly to avoid being associated with the defect.", "Document the safety concern in writing and escalate it within the organization; if not resolved, report to the relevant regulator or authority.", "Anonymously post about the defect on social media to warn the public immediately."], "answer": 2, "explanation": "Public safety is paramount and overrides employer loyalty. The engineer must follow the proper reporting sequence: document → raise with supervisor → escalate within the organization → report to the regulator/authority → public disclosure ONLY as a last resort. \n\nA is wrong — complying with management to suppress a safety issue is itself professional misconduct.\nB is wrong — resigning doesn't remove the duty to warn; the hazard still exists.\nD is wrong — going public BEFORE exhausting internal/regulatory channels violates the proper sequence and could expose the engineer to defamation claims. Public disclosure is a last resort, not a first move."}, {"id": 3, "type": "Legal application", "topic": "Law — Contracts", "stem": "An engineering consulting firm sends a quote to a potential client offering to perform a feasibility study for $25,000. The client replies: 'We accept, but the price needs to be $22,000.' From a contract-law perspective, this reply is:", "options": ["A valid acceptance — a contract has been formed at $22,000.", "A counter-offer, which terminates the original offer.", "A partial acceptance — a contract exists for $22,000 of the work.", "An invitation to treat that the firm may now respond to."], "answer": 1, "explanation": "Acceptance must be unconditional — a 'mirror image' of the offer. Any change in terms (price, scope, schedule) makes it a COUNTER-OFFER, which kills the original offer. The original offeror (the firm) is then free to accept, reject, or counter again.\n\nA is wrong — a price change is not 'acceptance.'\nC is wrong — contracts don't form partially based on which terms match.\nD is wrong — an invitation to treat is something like an advertisement; the firm's original quote was a genuine offer, not an invitation."}, {"id": 4, "type": "Best-answer", "topic": "Professional Practice", "stem": "Which of the following is the MOST effective way for a Professional Engineer to reduce their exposure to professional liability claims?", "options": ["Carrying high limits of errors-and-omissions insurance.", "Including limitation-of-liability clauses in every contract.", "Maintaining competence and adhering to professional standards of practice.", "Working only on small projects with low-risk clients."], "answer": 2, "explanation": "Insurance and contract clauses TRANSFER or LIMIT liability after a problem occurs — they don't reduce the risk of negligence itself. The most fundamental and effective protection is to actually meet the standard of care: stay competent, follow recognized practices, document decisions, and don't work outside your competence.\n\nA and B are useful but reactive — they help AFTER something goes wrong.\nD is professionally limiting and doesn't address the actual cause of liability (failure to meet standard of care)."}, {"id": 5, "type": "Ethical scenario", "topic": "Ethics — Conflicts of Interest", "stem": "An engineer is asked by their employer to evaluate three competing bids for a construction project. The engineer's brother-in-law is a senior employee at one of the bidding companies, though the engineer has no direct financial interest. What should the engineer do?", "options": ["Proceed with the evaluation — there is no actual conflict since the engineer has no financial interest.", "Disclose the relationship in writing to the employer and let them decide how to proceed.", "Quietly favour a different bidder to avoid any appearance of bias.", "Refuse to participate in the evaluation under any circumstances."], "answer": 1, "explanation": "This is a PERCEIVED (or apparent) conflict of interest — a reasonable observer would see a potential conflict, even though the engineer has no direct financial stake. The Code of Ethics requires DISCLOSURE of actual, potential, AND perceived conflicts. After disclosure, the employer can decide whether to reassign the evaluation, add independent reviewers, or proceed with the engineer's involvement.\n\nA is wrong — 'no actual conflict' isn't the test; perception matters too.\nC is wrong — actively biasing the evaluation against a fair bidder is itself misconduct.\nD is wrong — outright refusal isn't required if the conflict can be managed through disclosure. The employer might decide the engineer can still proceed with safeguards."}, {"id": 6, "type": "Legal application", "topic": "Law — Tort / Negligence", "stem": "For a plaintiff to succeed in a negligence claim against a Professional Engineer, which of the following must be proven?", "options": ["A signed contract between the engineer and the plaintiff.", "Intentional wrongdoing or malice on the part of the engineer.", "Duty of care, breach of that duty, causation, and damages.", "A criminal conviction of the engineer for the conduct in question."], "answer": 2, "explanation": "Negligence is a civil tort with four required elements: (1) duty of care, (2) breach of that duty (falling below the standard of care), (3) causation (the breach caused the harm), and (4) damages (real loss). All four must be proven on the balance of probabilities.\n\nA is wrong — a contract is NOT required. Donoghue v. Stevenson established that a duty of care can exist without privity (engineers owe duties to foreseeable third parties like building occupants, not just their direct clients).\nB is wrong — negligence does NOT require intent or malice; it requires only failure to meet the standard of care. Intentional conduct would be a different tort.\nD is wrong — negligence is a CIVIL matter; no criminal conviction is needed."}, {"id": 7, "type": "Categorization", "topic": "Professional Practice — Seal", "stem": "Which of the following actions by a Professional Engineer would MOST LIKELY be considered professional misconduct?", "options": ["Reviewing the work of another engineer with that engineer's knowledge.", "Applying their seal to engineering drawings prepared by a colleague that they reviewed in detail and accept responsibility for.", "Applying their seal to engineering drawings prepared by a third party without reviewing them.", "Declining a project that is outside their area of competence."], "answer": 2, "explanation": "'Plan stamping' — sealing work you have not personally prepared, supervised, OR thoroughly reviewed — is professional misconduct in every Canadian jurisdiction. The seal is a declaration that the engineer takes professional responsibility for the work; you cannot do that for work you haven't actually reviewed.\n\nA is acceptable — reviewing others' work (with their knowledge as a professional courtesy) is normal practice.\nB is acceptable — you may seal work you didn't personally prepare IF you reviewed it thoroughly and accept responsibility.\nD is the OPPOSITE of misconduct — declining work outside your competence is what the Code requires."}, {"id": 8, "type": "Ethical scenario", "topic": "Ethics — Competence", "stem": "A civil engineer with 15 years of structural design experience is asked by their employer to lead a project that involves electrical power systems — an area in which they have no formal training or experience. The schedule is tight. What is the MOST APPROPRIATE response?", "options": ["Accept the project — 15 years of engineering experience transfers across disciplines.", "Accept the project but research electrical systems online during evenings to catch up.", "Decline to lead the project, or accept it only if a qualified electrical engineer takes professional responsibility for the electrical work.", "Accept the project and seal the electrical drawings, since the employer has authorized you to do so."], "answer": 2, "explanation": "An engineer must only practice in areas where they have adequate training, education, AND experience. Working outside competence is professional misconduct, regardless of employer pressure or schedule. The proper response is to either decline OR arrange for a qualified specialist to take responsibility for the electrical work.\n\nA is wrong — engineering disciplines are not interchangeable; structural experience does not qualify someone for power-systems design.\nB is wrong — self-study at night is not adequate to develop competence in a complex specialty on a tight deadline.\nD is wrong — employer authorization cannot override the Code of Ethics or the Act. Sealing electrical work you're not competent to review is misconduct."}, {"id": 9, "type": "Categorization", "topic": "Intellectual Property", "stem": "Which form of intellectual property protection is automatic upon creation, without any registration being required?", "options": ["Patent", "Copyright", "Trademark", "Industrial design"], "answer": 1, "explanation": "Copyright protection is automatic the moment an original work is created in a fixed form (written down, recorded, drawn, coded, etc.). Registration is optional and can help in disputes, but is not required. Duration in Canada: life of the author + 70 years.\n\nPatents (20 years from filing) REQUIRE registration with CIPO.\nTrademarks can exist at common law from use, but registered trademark protection requires registration and gives much stronger rights.\nIndustrial designs (up to 15 years) REQUIRE registration with CIPO."}, {"id": 10, "type": "Legal application", "topic": "Law — Limitation Periods", "stem": "Under Ontario's Limitations Act, when does the basic 2-year limitation period for a negligence claim against an engineer generally begin to run?", "options": ["On the date the engineer completed the work.", "On the date the engineering services contract was signed.", "On the date the plaintiff knew or ought reasonably to have known of the claim.", "On the date the plaintiff first consulted a lawyer about the matter."], "answer": 2, "explanation": "This is the DISCOVERABILITY RULE. The 2-year basic limitation clock starts when the plaintiff knew — or ought reasonably to have known — about: the injury, that the defendant caused it, and that a legal claim was possible. \n\nThis is critical in engineering because defects (a foundation crack, a corroded weld, a latent design flaw) may not appear for years after the work was done. However, Ontario also has an ULTIMATE limitation of 15 years from the act/omission, after which claims are barred regardless of discoverability.\n\nA is wrong — the clock doesn't start at work completion if the defect is latent.\nB is wrong — limitation periods relate to when the claim was discoverable, not when the contract was signed.\nD is wrong — consulting a lawyer is not the trigger; reasonable discoverability is."}, {"id": 11, "type": "Best-practice", "topic": "Professional Practice — Dispute Resolution", "stem": "A technical dispute arises between an engineering consultant and their client regarding the interpretation of design specifications. The dispute is technical in nature and both parties want it resolved quickly without destroying the ongoing business relationship. Which dispute-resolution mechanism is MOST appropriate?", "options": ["Litigation in superior court.", "Mediation followed by arbitration if needed.", "Filing a complaint with the engineering regulator.", "Public arbitration via media coverage."], "answer": 1, "explanation": "Alternative Dispute Resolution (ADR) — particularly mediation and arbitration — is generally faster, cheaper, more private, and better at preserving business relationships than litigation. For technical disputes specifically, arbitration is well-suited because arbitrators can be chosen for technical expertise.\n\nTypical sequence: negotiation → mediation (non-binding facilitator) → arbitration (binding decision by a neutral third party) → litigation as a last resort.\n\nA is wrong — litigation is slow (often years), expensive, public, and adversarial.\nC is wrong — the regulator handles professional misconduct, not commercial contract disputes.\nD is wrong — 'media coverage' is not a legal mechanism and would damage both parties."}, {"id": 12, "type": "Ethical scenario", "topic": "Ethics — Confidentiality", "stem": "An engineer has left a former employer and signed a confidentiality agreement covering proprietary information. While working for a new employer, the engineer realizes that a product their FORMER employer is still selling has a serious safety defect that could harm consumers. What should the engineer do?", "options": ["Honour the confidentiality agreement — the matter is no longer their responsibility.", "Contact the former employer to notify them of the defect; if they fail to act, report the safety concern to the relevant authority.", "Wait until the confidentiality agreement expires before taking any action.", "Tell the new employer to use the safety issue as a competitive advantage in marketing."], "answer": 1, "explanation": "Public safety is paramount and overrides confidentiality obligations to a former employer. Confidentiality clauses are unenforceable to the extent they would conceal hazards to the public. The proper sequence: \n1. Notify the former employer first, giving them a reasonable chance to act.\n2. If they fail to act, escalate to the regulator / relevant authority.\n\nA is wrong — confidentiality NEVER shields public-safety hazards. Following the agreement when people could be harmed is itself misconduct.\nC is wrong — delaying action while people remain at risk is unethical.\nD is wrong — exploiting a safety defect for commercial gain (rather than acting to fix it) is unconscionable and would likely violate the Code on multiple counts."}, {"id": 13, "type": "Best-answer", "topic": "Ethics — Code Hierarchy", "stem": "Under the Code of Ethics, when an engineer's duty to their employer conflicts with their duty to the public, which prevails?", "options": ["The duty to the employer — the engineer is paid to serve the employer's interests.", "Whichever duty was assumed first in time.", "The duty to the public, which is paramount under every Canadian engineering code of ethics.", "Neither — the engineer must resign to avoid the conflict."], "answer": 2, "explanation": "The duty to the public — encompassing safety, health, welfare, and the environment — is PARAMOUNT and explicitly overrides duties to the employer, client, profession, and self. This is the single most important principle in the Code of Ethics.\n\nOrder of duties:\n1. Public (paramount)\n2. Employer\n3. Client\n4. Colleagues / Profession\n5. Self\n\nResigning (D) does not resolve a public-safety issue — the hazard remains. The engineer's duty is to address the issue through proper reporting channels, not to walk away."}, {"id": 14, "type": "Legal application", "topic": "Law — Employment / Liability", "stem": "A junior engineer makes a negligent calculation error while working on a project for their employer. The error causes financial loss to the client. From a legal perspective, who can be held liable?", "options": ["Only the junior engineer personally — they made the error.", "Only the employer — the junior engineer was acting under direction.", "Both the junior engineer (for the negligent act) and the employer (vicariously, for the acts of their employee within scope of employment).", "Neither — junior engineers are protected from liability while supervised."], "answer": 2, "explanation": "VICARIOUS LIABILITY: an employer is liable for the negligent acts of their employees committed within the scope of employment. This doesn't remove the employee's personal liability — both can be sued. In practice, plaintiffs sue both and collect from whoever has the deeper pockets (joint and several liability).\n\nNote: this is one reason employer's E&O insurance matters, and why senior engineers who supervise junior staff should ensure proper review processes.\n\nA is wrong — vicarious liability extends to the employer.\nB is wrong — the employee remains personally liable for their own negligent acts.\nD is wrong — being junior or supervised does not eliminate personal liability for negligence."}, {"id": 15, "type": "Ethical scenario", "topic": "Ethics — Gifts and Influence", "stem": "An engineer is responsible for evaluating proposals from several contractors for an upcoming project. One contractor offers the engineer two tickets to a professional sports event valued at approximately $400. The contractor says it's 'just a token of appreciation' for past business. What is the MOST APPROPRIATE response?", "options": ["Accept the tickets — they are a personal gift unrelated to the upcoming evaluation.", "Accept the tickets but be careful to evaluate the contractor's proposal objectively.", "Decline the gift, document the offer, and disclose it to the employer.", "Accept the tickets only if the engineer's manager also receives an equivalent gift."], "answer": 2, "explanation": "A gift of significant value from a party with whom the engineer has — or will have — professional decisions to make creates an actual or perceived conflict of interest. Even if the engineer believes their judgment is unaffected, the APPEARANCE of influence matters. The proper response is to decline, document the offer, and disclose to the employer (who may have specific policies on gift acceptance).\n\nNominal items (a coffee, a branded pen, an inexpensive lunch in the course of a meeting) generally don't trigger this concern. The bright line is gifts that a reasonable observer would see as potentially influencing judgment.\n\nA is wrong — calling something a 'personal gift' doesn't change the COI analysis.\nB is wrong — believing yourself to be objective doesn't cure the appearance problem.\nD is wrong — spreading the gift around doesn't resolve the conflict; it expands it."}]}</script>

<script>
const DATA = JSON.parse(document.getElementById('dataScript').textContent);
const QUESTIONS = DATA.questions;
const LETTERS = ['A', 'B', 'C', 'D'];

let currentIdx = 0;
let answers = {};  // qid -> selected option index
let locked = {};   // qid -> true if answered & feedback shown

function showQuestion(idx) {
  currentIdx = idx;
  const q = QUESTIONS[idx];
  const area = document.getElementById('quizArea');

  const userAnswer = answers[q.id];
  const isLocked = locked[q.id];

  let optionsHtml = '';
  q.options.forEach((text, i) => {
    let classes = 'option';
    if (isLocked) {
      classes += ' locked';
      if (i === q.answer) classes += ' correct';
      else if (i === userAnswer) classes += ' wrong';
      else classes += ' dimmed';
    } else if (userAnswer === i) {
      classes += ' selected';
    }
    optionsHtml += `
      <div class="${classes}" onclick="selectOption(${q.id}, ${i})">
        <span class="option-letter">${LETTERS[i]}.</span>
        <span>${escapeHtml(text)}</span>
      </div>`;
  });

  let feedbackHtml = '';
  if (isLocked) {
    const correct = userAnswer === q.answer;
    feedbackHtml = `
      <div class="feedback ${correct ? 'correct' : 'wrong'} show">
        <div class="verdict">${correct ? '✓ Correct' : '✗ Not quite — the correct answer is ' + LETTERS[q.answer]}</div>
        <div>${escapeHtml(q.explanation).replace(/\n/g, '<br>')}</div>
      </div>`;
  }

  const isLast = idx === QUESTIONS.length - 1;
  const nextLabel = isLocked ? (isLast ? 'See Results →' : 'Next Question →') : 'Submit Answer';
  const nextDisabled = userAnswer === undefined ? 'disabled' : '';

  area.innerHTML = `
    <div class="question">
      <div class="qmeta">
        <span class="qnumber">Question ${idx + 1}</span>
        <span class="qtype">${q.type} · ${q.topic}</span>
      </div>
      <div class="stem">${escapeHtml(q.stem)}</div>
      <div class="options">${optionsHtml}</div>
      ${feedbackHtml}
      <div class="nav">
        <button onclick="prevQuestion()" ${idx === 0 ? 'disabled' : ''}>← Previous</button>
        <button class="primary" id="nextBtn" ${nextDisabled} onclick="handleNext()">${nextLabel}</button>
      </div>
    </div>
  `;

  updateProgress();
}

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function selectOption(qid, optIdx) {
  if (locked[qid]) return;
  answers[qid] = optIdx;
  showQuestion(currentIdx);
}

function handleNext() {
  const q = QUESTIONS[currentIdx];
  if (!locked[q.id]) {
    if (answers[q.id] === undefined) return;
    locked[q.id] = true;
    showQuestion(currentIdx);
    return;
  }
  if (currentIdx === QUESTIONS.length - 1) {
    showResults();
  } else {
    showQuestion(currentIdx + 1);
  }
}

function prevQuestion() {
  if (currentIdx > 0) showQuestion(currentIdx - 1);
}

function updateProgress() {
  const total = QUESTIONS.length;
  const answered = Object.keys(locked).length;
  const score = QUESTIONS.filter(q => locked[q.id] && answers[q.id] === q.answer).length;
  document.getElementById('progressText').textContent = `Question ${currentIdx + 1} of ${total}`;
  document.getElementById('progressFill').style.width = ((currentIdx + 1) / total * 100) + '%';
  document.getElementById('scoreText').textContent = `Score: ${score}/${answered}`;
}

function showResults() {
  document.getElementById('quizArea').style.display = 'none';
  document.getElementById('progressWrap').style.display = 'none';
  const results = document.getElementById('results');
  results.classList.add('show');

  const score = QUESTIONS.filter(q => answers[q.id] === q.answer).length;
  const pct = Math.round(score / QUESTIONS.length * 100);

  document.getElementById('finalScore').textContent = `${score} / ${QUESTIONS.length}`;
  document.getElementById('finalPercent').textContent = `${pct}%`;

  let verdict = '';
  if (pct >= 80) verdict = "Strong baseline. Your reading time can be focused on areas where you missed questions — you're already in good shape.";
  else if (pct >= 65) verdict = "Solid foundation, but several gaps to close. Focus on the weakest topic areas below over your study plan.";
  else if (pct >= 50) verdict = "You have some intuition but key concepts need work. Prioritize the topic areas where you scored lowest — they will dominate your study time.";
  else verdict = "This is normal before any prep. The diagnostic has done its job by showing where to focus. The 15-20 hour plan is designed for exactly this starting point.";
  document.getElementById('verdictText').textContent = verdict;

  // Breakdown by type
  const typeStats = {};
  const topicStats = {};
  QUESTIONS.forEach(q => {
    const correct = answers[q.id] === q.answer;
    typeStats[q.type] = typeStats[q.type] || { correct: 0, total: 0 };
    typeStats[q.type].total++;
    if (correct) typeStats[q.type].correct++;

    // simpler topic grouping
    let group = q.topic;
    if (group.startsWith('Ethics')) group = 'Ethics';
    else if (group.startsWith('Law')) group = 'Law';
    else if (group.startsWith('Professional')) group = 'Professional Practice';

    topicStats[group] = topicStats[group] || { correct: 0, total: 0 };
    topicStats[group].total++;
    if (correct) topicStats[group].correct++;
  });

  function renderBreakdown(stats, elId) {
    const el = document.getElementById(elId);
    const rows = Object.entries(stats).sort((a, b) => (b[1].correct/b[1].total) - (a[1].correct/a[1].total));
    el.innerHTML = rows.map(([name, s]) => {
      const p = s.correct / s.total;
      const cls = p >= 0.75 ? 'good' : p >= 0.5 ? 'mid' : 'weak';
      return `<div class="breakdown-row">
        <span class="label">${escapeHtml(name)}</span>
        <span class="score ${cls}">${s.correct} / ${s.total}</span>
      </div>`;
    }).join('');
  }
  renderBreakdown(typeStats, 'typeBreakdown');
  renderBreakdown(topicStats, 'topicBreakdown');

  results.scrollIntoView({ behavior: 'smooth' });
}

// Initial render
showQuestion(0);
</script>
</body>
</html>
