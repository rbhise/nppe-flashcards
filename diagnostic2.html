<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NPPE Diagnostic Quiz #2</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root {
    --bg: #f4f1ea;
    --paper: #fffdf7;
    --ink: #1a1a1a;
    --ink-soft: #555;
    --accent: #8b3a3a;       /* deep burgundy */
    --accent-soft: #c9a47a;  /* warm tan */
    --line: #d8d1c0;
    --back-bg: #faf3e0;
    --shadow: rgba(60, 40, 20, 0.12);
    --shadow-deep: rgba(60, 40, 20, 0.22);
    --correct: #2d6a2f;
    --correct-bg: #e6f0e2;
    --wrong: #a33;
    --wrong-bg: #f5e2e2;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { min-height: 100%; }
  body {
    background: var(--bg);
    background-image:
      radial-gradient(circle at 20% 30%, rgba(139, 58, 58, 0.04), transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(201, 164, 122, 0.06), transparent 50%);
    color: var(--ink);
    font-family: Georgia, 'Iowan Old Style', serif;
    padding: 24px 16px 60px;
    line-height: 1.5;
  }

  header {
    max-width: 760px;
    margin: 0 auto 16px;
    text-align: center;
  }
  h1 {
    font-family: 'Iowan Old Style', Georgia, serif;
    font-size: clamp(26px, 5vw, 38px);
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 4px;
  }
  h1 .accent { color: var(--accent); font-style: italic; }
  .subtitle {
    color: var(--ink-soft);
    font-size: 13px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .container {
    max-width: 760px;
    margin: 0 auto;
  }

  /* Progress */
  .progress-wrap {
    margin: 16px 0;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 1px 3px var(--shadow);
  }
  .progress-text {
    font-size: 13px;
    color: var(--ink-soft);
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }
  .progress-bar {
    flex: 1;
    height: 6px;
    background: var(--line);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.3s ease;
    width: 0;
  }

  /* Question card */
  .question {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 28px 32px;
    box-shadow:
      0 1px 2px var(--shadow),
      0 12px 28px -8px var(--shadow-deep);
    margin-bottom: 16px;
  }
  @media (max-width: 600px) {
    .question { padding: 20px 18px; }
  }

  .qmeta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .qnumber {
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
  }
  .qtype {
    font-size: 11px;
    letter-spacing: 0.5px;
    color: var(--ink-soft);
    font-style: italic;
  }

  .stem {
    font-size: clamp(15px, 2vw, 17px);
    font-weight: 500;
    line-height: 1.55;
    color: var(--ink);
    margin-bottom: 20px;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .option {
    display: flex;
    align-items: flex-start;
    padding: 12px 14px;
    border: 1px solid var(--line);
    border-radius: 4px;
    background: var(--paper);
    cursor: pointer;
    transition: all 0.15s ease;
    font-size: clamp(14px, 1.9vw, 15px);
    line-height: 1.5;
  }
  .option:hover:not(.locked) {
    border-color: var(--accent);
    background: #faf6ee;
  }
  .option-letter {
    font-weight: 700;
    color: var(--accent);
    margin-right: 12px;
    min-width: 20px;
    font-family: Georgia, serif;
  }
  .option.selected {
    border-color: var(--accent);
    background: #faf6ee;
  }
  .option.correct {
    border-color: var(--correct);
    background: var(--correct-bg);
  }
  .option.correct .option-letter { color: var(--correct); }
  .option.wrong {
    border-color: var(--wrong);
    background: var(--wrong-bg);
  }
  .option.wrong .option-letter { color: var(--wrong); }
  .option.locked { cursor: default; }
  .option.locked.dimmed { opacity: 0.55; }

  .feedback {
    margin-top: 18px;
    padding: 14px 16px;
    border-radius: 4px;
    border-left: 3px solid var(--accent);
    background: var(--back-bg);
    font-size: clamp(13px, 1.7vw, 14px);
    line-height: 1.55;
    white-space: pre-wrap;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback .verdict {
    font-weight: 700;
    margin-bottom: 8px;
    font-family: Georgia, serif;
    font-size: 14px;
    letter-spacing: 0.3px;
  }
  .feedback.correct { border-left-color: var(--correct); background: var(--correct-bg); }
  .feedback.correct .verdict { color: var(--correct); }
  .feedback.wrong { border-left-color: var(--wrong); background: var(--wrong-bg); }
  .feedback.wrong .verdict { color: var(--wrong); }

  /* Navigation */
  .nav {
    display: flex;
    gap: 10px;
    justify-content: space-between;
    align-items: center;
    margin-top: 20px;
    flex-wrap: wrap;
  }
  button {
    font-family: inherit;
    font-size: 14px;
    padding: 10px 18px;
    border: 1px solid var(--line);
    background: var(--paper);
    color: var(--ink);
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s ease;
    font-weight: 600;
  }
  button:hover:not(:disabled) {
    border-color: var(--accent);
    color: var(--accent);
  }
  button.primary {
    background: var(--accent);
    color: var(--paper);
    border-color: var(--accent);
  }
  button.primary:hover:not(:disabled) {
    background: #6e2d2d;
    color: var(--paper);
  }
  button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  /* Results */
  .results {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 32px;
    box-shadow:
      0 1px 2px var(--shadow),
      0 12px 28px -8px var(--shadow-deep);
    text-align: center;
    display: none;
  }
  .results.show { display: block; }
  .score-big {
    font-size: clamp(48px, 10vw, 72px);
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
    font-family: 'Iowan Old Style', Georgia, serif;
  }
  .score-label {
    font-size: 14px;
    color: var(--ink-soft);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 4px;
    margin-bottom: 24px;
  }
  .verdict-text {
    font-size: 16px;
    font-style: italic;
    color: var(--ink);
    margin-bottom: 24px;
    line-height: 1.6;
  }
  .breakdown {
    text-align: left;
    margin: 24px 0;
    padding: 20px;
    background: var(--back-bg);
    border-radius: 4px;
  }
  .breakdown h3 {
    font-size: 13px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
    font-weight: 600;
  }
  .breakdown-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    font-size: 14px;
    border-bottom: 1px solid var(--line);
  }
  .breakdown-row:last-child { border-bottom: none; }
  .breakdown-row .label { color: var(--ink-soft); }
  .breakdown-row .score {
    font-variant-numeric: tabular-nums;
    font-weight: 600;
  }
  .breakdown-row .score.good { color: var(--correct); }
  .breakdown-row .score.mid { color: #b08400; }
  .breakdown-row .score.weak { color: var(--wrong); }

  .review-link {
    display: inline-block;
    margin-top: 16px;
    color: var(--accent);
    text-decoration: underline;
    cursor: pointer;
    font-size: 14px;
  }
</style>
</head>

<script id="dataScript" type="application/json">{"questions": [{"id": 1, "type": "Direct recall", "topic": "Regulation", "stem": "Which body has the legal authority to license Professional Engineers in Ontario?", "options": ["Engineers Canada", "Professional Engineers Ontario (PEO)", "The Canadian Engineering Accreditation Board (CEAB)", "The Ontario Society of Professional Engineers (OSPE)"], "answer": 1, "explanation": "Engineering is regulated PROVINCIALLY in Canada. PEO is the licensing body in Ontario, established under the Professional Engineers Act.\n\nA is wrong — Engineers Canada is an association of the 12 provincial/territorial regulators. It develops national guidelines and supports accreditation, but does NOT license individuals.\nC is wrong — CEAB accredits engineering EDUCATION programs at universities; it does not license engineers.\nD is wrong — OSPE is an advocacy body for engineers in Ontario, not a regulator."}, {"id": 2, "type": "Ethical scenario", "topic": "Ethics — Integrity", "stem": "An engineer is preparing a technical report for a client and finds an excellent analysis of a similar problem in a published paper by another engineer. The engineer copies several paragraphs of the analysis directly into their report without attribution, reasoning that 'the science is the same regardless of who wrote it.' What is the MOST APPROPRIATE assessment of this conduct?", "options": ["Acceptable — technical content is not subject to copyright when used for professional purposes.", "Acceptable as long as the engineer believes the information is accurate.", "It constitutes plagiarism and is a breach of the Code of Ethics, regardless of accuracy.", "Acceptable only if the engineer would have produced similar wording independently."], "answer": 2, "explanation": "Using another's work without attribution is plagiarism — a breach of the Code of Ethics (which requires integrity and honesty) and potentially a violation of copyright law. The accuracy of the content is irrelevant; what matters is honest attribution of the SOURCE of the work.\n\nA is wrong — technical writing IS protected by copyright (life of author + 70 years in Canada).\nB is wrong — accuracy doesn't cure misattribution; you can be accurate AND dishonest.\nD is wrong — copying verbatim and 'I would have written something similar' are completely different. The test is what you actually did, not what you might have done."}, {"id": 3, "type": "Legal application", "topic": "Law — Contracts", "stem": "An engineer agrees orally with a friend to design a small backyard structure 'for free, just to help out.' After the engineer completes the design, the friend refuses to even pay for materials the engineer purchased. The engineer wants to sue for breach of contract. The MOST LIKELY problem with this claim is:", "options": ["There was no written contract, so no contract exists.", "There was no consideration flowing from the friend to the engineer, so no enforceable contract exists.", "Oral contracts are never enforceable in Canada.", "Engineers cannot enter into contracts with family or friends."], "answer": 1, "explanation": "A contract requires CONSIDERATION — something of value exchanged BOTH ways. The engineer agreed to provide design services 'for free,' meaning nothing of value was promised in return. A gratuitous promise (a gift) is generally not enforceable as a contract. The engineer might recover materials cost under QUANTUM MERUIT or unjust enrichment principles, but not under contract law.\n\nA is wrong — most oral contracts ARE enforceable. The Statute of Frauds requires writing only for specific categories (land, guarantees, contracts > 1 year).\nC is wrong — oral contracts are routinely enforced in Canada.\nD is wrong — engineers can contract with anyone of legal capacity."}, {"id": 4, "type": "Best-answer", "topic": "Ethics — Environment", "stem": "Under modern Canadian engineering codes of ethics, an engineer's obligation regarding environmental protection is MOST accurately described as:", "options": ["Following all applicable environmental laws and regulations, but nothing beyond that.", "Avoiding any project that has any environmental impact whatsoever.", "Considering and promoting the principles of sustainable development as part of their professional duty to society.", "Letting environmental specialists handle all environmental considerations."], "answer": 2, "explanation": "Engineers Canada and provincial codes increasingly frame environmental responsibility as part of the duty to society. Engineers are expected to consider sustainable development — meeting present needs without compromising future generations — and to flag environmental concerns even where not strictly required by law.\n\nA is wrong — mere legal compliance is a FLOOR, not the ethical standard. Codes typically require more than minimum legal compliance.\nB is wrong — virtually every engineering project has SOME environmental impact; the goal is responsible management, not avoidance.\nD is wrong — environmental responsibility is shared by all engineers, not delegated entirely to specialists. You can rely on specialist input but cannot abdicate the broader professional duty."}, {"id": 5, "type": "Ethical scenario", "topic": "Ethics — Peer Review", "stem": "An engineer is hired by a building owner to provide a second opinion on the structural design of a renovation, prepared by another Professional Engineer. The owner has not informed the original engineer about the review. What should the second engineer do?", "options": ["Refuse to do the review under any circumstances — reviewing another engineer's work without their consent is unethical.", "Proceed with the review but notify the original engineer as a professional courtesy, unless doing so would compromise the purpose of the review (e.g., suspected misconduct).", "Proceed without notification — the owner is the client and decides what disclosures to make.", "Notify the original engineer and refuse to proceed unless the original engineer consents."], "answer": 1, "explanation": "Reviewing another engineer's work IS permitted (and common). The Code typically requires the reviewing engineer to NOTIFY the original engineer as a matter of professional courtesy, but does NOT require consent. \n\nNotification can be set aside if it would compromise the purpose of the review (for example, in misconduct investigations or litigation contexts). The reviewer must also be competent in the subject area.\n\nA is wrong — there's no blanket prohibition on review.\nC is wrong — notification is the professional norm; ignoring it shows lack of courtesy to a peer.\nD is wrong — consent isn't required; the original engineer can't veto a legitimate review."}, {"id": 6, "type": "Legal application", "topic": "Law — Standard of Care", "stem": "In a negligence lawsuit against a Professional Engineer, the 'standard of care' the engineer is expected to meet is the standard of:", "options": ["A perfect engineer with the benefit of hindsight.", "The most accomplished expert in the field worldwide.", "A reasonably competent engineer in the same specialty, applying the knowledge and practices that existed at the time of the work.", "An average member of the public when faced with the same problem."], "answer": 2, "explanation": "The legal standard of care for a professional is what a REASONABLY COMPETENT peer would do in the same circumstances. Two important refinements:\n• Specialty matters — a structural engineer is judged against other structural engineers, not a general engineer.\n• The state of knowledge at the TIME of the work governs, not later developments (no judgment by hindsight).\n\nA is wrong — perfection is not the standard; reasonableness is.\nB is wrong — engineers are not held to the highest expert level worldwide; that would set an unrealistic bar.\nD is wrong — engineers are held to PROFESSIONAL standards, not those of laypersons."}, {"id": 7, "type": "Categorization", "topic": "Intellectual Property", "stem": "Which of the following is NOT a requirement for obtaining a Canadian patent?", "options": ["The invention must be new (novel).", "The invention must be useful.", "The invention must be non-obvious to someone skilled in the art.", "The invention must be commercially successful in the market."], "answer": 3, "explanation": "The three patentability requirements in Canada are:\n1. NOVELTY (new — not previously disclosed publicly)\n2. UTILITY (useful — has practical application)\n3. NON-OBVIOUSNESS (inventive — not obvious to a person skilled in the art)\n\nCommercial success is NOT a patent requirement. Many patents are granted for inventions that never become commercial products. Watch for 'NOT' in the stem — it flips the logic.\n\nNote: Canada has been a FIRST-TO-FILE system since 1989 (not first-to-invent). A patent lasts 20 years from filing date, not renewable."}, {"id": 8, "type": "Ethical scenario", "topic": "Ethics — Reporting Peers", "stem": "An engineer becomes aware that a fellow Professional Engineer at a competitor firm has been sealing structural drawings for projects clearly outside the area of that engineer's competence, resulting in designs that may not meet code requirements. What is the MOST APPROPRIATE action?", "options": ["Report the conduct to the regulator (e.g., PEO), as engineers have a duty to report apparent professional misconduct of other engineers.", "Take no action — interfering in a competitor's affairs is itself unprofessional.", "Use the information to gain competitive advantage when bidding on similar projects.", "Contact the affected clients directly to warn them about the competitor's practices."], "answer": 0, "explanation": "Engineers have a Code obligation to report apparent professional misconduct of other engineers to the regulator, particularly where public safety may be at risk. The regulator (PEO) has the investigative authority and procedural fairness framework to properly assess the situation.\n\nB is wrong — the duty to report is not waived because the other engineer is a competitor. In fact, professional duty REQUIRES setting aside competitive interests.\nC is wrong — using regulatory failures for commercial advantage is itself a Code violation and exploits public safety concerns for profit.\nD is wrong — bypassing the regulator and going directly to clients risks defamation claims and is not the proper channel. Report to PEO, who can act with appropriate authority and due process."}, {"id": 9, "type": "Legal application", "topic": "Law — Employment", "stem": "An engineer is engaged by a company to develop a new technical product. The engineer works at home using their own equipment, sets their own hours, has several other clients, and is paid a fixed fee for the project. The relationship is MOST LIKELY characterized as:", "options": ["Employment, because the company directs what is to be produced.", "An independent contractor relationship.", "A partnership.", "A joint venture."], "answer": 1, "explanation": "The facts point strongly to an INDEPENDENT CONTRACTOR relationship. The classic tests look at:\n• CONTROL — engineer sets own hours (low employer control) ✓ contractor\n• OWNERSHIP of tools — own equipment ✓ contractor\n• CHANCE OF PROFIT / RISK OF LOSS — fixed fee for project (own profit risk) ✓ contractor\n• EXCLUSIVITY — has multiple clients ✓ contractor\n\nThis matters because:\n• The COMPANY likely doesn't have vicarious liability for the engineer's acts.\n• The COMPANY doesn't owe CPP/EI contributions or employment-standards protections.\n• Importantly, IP created by an independent contractor generally belongs to the CONTRACTOR unless the contract assigns it to the company (opposite of the employee rule).\n\nC and D are wrong — partnerships and joint ventures involve shared ownership of an enterprise, which isn't suggested by these facts."}, {"id": 10, "type": "Legal application", "topic": "Law — Limitation Periods", "stem": "Under Ontario's Limitations Act, an engineer designed and certified a building in 2008. A serious latent structural defect is discovered in 2026, eighteen years later. With respect to a negligence claim against the engineer:", "options": ["The 2-year basic limitation period applies, starting in 2026 when the defect was discovered.", "The ultimate 15-year limitation period bars the claim, regardless of when the defect was discovered.", "There is no limitation period for latent defects causing safety hazards.", "The claim must be brought within 6 years under the Real Property Limitations Act."], "answer": 1, "explanation": "Ontario's Limitations Act has TWO limitation periods that work together:\n• BASIC: 2 years from discoverability\n• ULTIMATE: 15 years from the act/omission itself (the negligent design in 2008)\n\nThe ULTIMATE limitation acts as a hard ceiling: even if the defect is discovered much later, a claim is barred 15 years after the negligent conduct. Here, the design was in 2008, so the ultimate period expired in 2023. The 2026 discovery is too late.\n\nPolicy rationale: at some point, engineers, contractors, and their insurers need certainty that historical work is no longer a source of liability. Records and memories degrade over time.\n\nA is wrong — discoverability triggers the basic period, but the ULTIMATE cap still applies.\nC is wrong — even safety-related claims are subject to ultimate limitation.\nD is wrong — Real Property Limitations Act applies to land claims, not negligence claims against engineers."}, {"id": 11, "type": "Best-practice", "topic": "Professional Practice — Documentation", "stem": "Which of the following is the MOST important reason for an engineer to maintain thorough, contemporaneous documentation of design decisions, calculations, and communications throughout a project?", "options": ["To impress clients during periodic project reviews.", "To support quality assurance, defend against future liability claims, and demonstrate the standard of care was met.", "To satisfy administrative requirements of the regulator's continuing-competence program.", "To create training material for junior staff."], "answer": 1, "explanation": "Documentation serves multiple critical purposes, but the most important from a professional-practice standpoint is risk management:\n• Quality assurance — catches errors before they propagate\n• Liability defence — proof that the standard of care was met\n• Regulatory defence — evidence in any misconduct investigation\n• Knowledge transfer when staff change\n\nEngineers should retain documentation for AT LEAST the applicable limitation period (15 years in Ontario, longer for safety-critical work).\n\nA and D are real benefits but secondary.\nC is a reasonable secondary purpose but not the primary one."}, {"id": 12, "type": "Ethical scenario", "topic": "Ethics — Whistleblowing", "stem": "A consulting engineer discovers that their client has been systematically violating environmental regulations by discharging untreated effluent into a nearby waterway. The client refuses to remediate when the issue is raised and threatens to terminate the consulting contract if the engineer makes 'noise' about it. What should the engineer do?", "options": ["Withdraw from the engagement quietly to preserve the client relationship for future work.", "Continue the engagement but document the engineer's objections in writing only for personal records.", "Report the violation to the appropriate environmental authority, even at the cost of losing the client.", "Negotiate a higher fee to compensate for the increased professional risk."], "answer": 2, "explanation": "Public welfare and the environment are paramount duties under the Code of Ethics. They override the engineer's duty to their employer/client, and override commercial interests. Environmental violations causing harm cannot be hidden behind client confidentiality.\n\nMost provincial Acts also have specific obligations regarding environmental harm, and the federal Fisheries Act and CEPA make it an offence to permit certain discharges.\n\nA is wrong — quiet withdrawal leaves the public/environment exposed; the engineer still has a duty to report.\nB is wrong — documenting in private without reporting doesn't discharge the duty.\nD is wrong — extracting a higher fee in exchange for silence about environmental violations is essentially extortion and grossly unethical."}, {"id": 13, "type": "Best-answer", "topic": "Professional Practice — Insurance", "stem": "An engineering consulting firm carries Commercial General Liability (CGL) insurance. A client sues the firm alleging that a faulty engineering design produced by the firm caused costly construction rework. Which type of insurance is the firm MOST likely to need to respond to this claim?", "options": ["The CGL policy, because the loss arose during the firm's operations.", "Professional Errors & Omissions (E&O) insurance, because the claim is for negligent professional services.", "Workers' compensation (WSIB), because the firm's employees produced the design.", "Directors and Officers (D&O) insurance, because the firm's directors approved the project."], "answer": 1, "explanation": "PROFESSIONAL E&O insurance covers claims arising from negligence in professional services — exactly this type of claim (a faulty design causing financial loss). CGL policies SPECIFICALLY EXCLUDE professional services. Many engineers and engineering students mistakenly believe CGL covers them; it does not.\n\nWhat CGL DOES cover: bodily injury and property damage from non-professional operations (a contractor's truck damages a client's gate; a visitor slips and falls at your office).\n\nC is wrong — WSIB covers workplace injuries to employees, not third-party claims against the firm.\nD is wrong — D&O insurance protects directors personally against claims from shareholders, creditors, or regulators — not professional negligence claims."}, {"id": 14, "type": "Categorization", "topic": "Professional Practice — Seal", "stem": "Which of the following would generally be CONSIDERED APPROPRIATE use of a Professional Engineer's seal?", "options": ["Sealing a preliminary design sketch issued early in a project to set client expectations.", "Sealing the firm's brochure to demonstrate that the firm is led by Professional Engineers.", "Sealing final, issued-for-construction drawings that the engineer prepared or thoroughly reviewed.", "Sealing drawings prepared by another engineer at the request of that engineer's client, without reviewing them."], "answer": 2, "explanation": "The seal is reserved for FINAL engineering documents that the engineer prepared (or thoroughly reviewed and takes responsibility for). Sealing the wrong things creates risk in two directions: under-sealing leaves work unaccounted for, while over-sealing creates liability for documents that aren't ready for use.\n\nA is wrong — preliminary documents generally should NOT be sealed, or should be clearly marked 'PRELIMINARY — NOT FOR CONSTRUCTION' to avoid being mistaken for final design.\nB is wrong — the seal is for engineering documents, not marketing materials.\nD is wrong — this is 'plan stamping,' a clear case of professional misconduct."}, {"id": 15, "type": "Ethical scenario", "topic": "Ethics — Honesty", "stem": "An engineer is asked by a client to prepare an opinion letter supporting a design approach the engineer privately considers risky and not best practice. The client says: 'Just give me the favourable opinion — your name on the letter is what we need for our investors.' What should the engineer do?", "options": ["Provide the letter as requested — the client is paying for the engineer's signature.", "Provide the letter but include a small disclaimer in fine print at the end.", "Decline to provide a letter that does not reflect the engineer's honest professional opinion.", "Provide the letter, then privately warn the investors of the engineer's true concerns."], "answer": 2, "explanation": "Engineers must be honest and objective in professional opinions, reports, and certifications. Issuing an opinion letter the engineer does not actually believe is a fundamental breach of integrity. It could also constitute NEGLIGENT (or even FRAUDULENT) MISREPRESENTATION under the Hedley Byrne principle — exposing the engineer to lawsuits from investors who rely on the letter.\n\nThe correct response is to decline. The engineer can offer to write what they actually believe (which may not be what the client wants), or to decline the engagement entirely.\n\nA is wrong — engineers sell professional judgment, not signatures-for-hire.\nB is wrong — a fine-print disclaimer doesn't cure a fundamentally dishonest opinion; reasonable readers focus on the main message.\nD is wrong — privately warning some investors while publicly signing the opposite is duplicitous and creates an even worse ethical and legal position."}]}</script>

<script>

let answers = {};  // qid -> selected option index
let locked = {};   // qid -> true if answered & feedback shown

function showQuestion(idx) {
  currentIdx = idx;
  const q = QUESTIONS[idx];
  const area = document.getElementById('quizArea');

  const userAnswer = answers[q.id];
  const isLocked = locked[q.id];

  let optionsHtml = '';
  q.options.forEach((text, i) => {
    let classes = 'option';
    if (isLocked) {
      classes += ' locked';
      if (i === q.answer) classes += ' correct';
      else if (i === userAnswer) classes += ' wrong';
      else classes += ' dimmed';
    } else if (userAnswer === i) {
      classes += ' selected';
    }
    optionsHtml += `
      <div class="${classes}" onclick="selectOption(${q.id}, ${i})">
        <span class="option-letter">${LETTERS[i]}.</span>
        <span>${escapeHtml(text)}</span>
      </div>`;
  });

  let feedbackHtml = '';
  if (isLocked) {
    const correct = userAnswer === q.answer;
    feedbackHtml = `
      <div class="feedback ${correct ? 'correct' : 'wrong'} show">
        <div class="verdict">${correct ? '✓ Correct' : '✗ Not quite — the correct answer is ' + LETTERS[q.answer]}</div>
        <div>${escapeHtml(q.explanation).replace(/\n/g, '<br>')}</div>
      </div>`;
  }

  const isLast = idx === QUESTIONS.length - 1;
  const nextLabel = isLocked ? (isLast ? 'See Results →' : 'Next Question →') : 'Submit Answer';
  const nextDisabled = userAnswer === undefined ? 'disabled' : '';

  area.innerHTML = `
    <div class="question">
      <div class="qmeta">
        <span class="qnumber">Question ${idx + 1}</span>
        <span class="qtype">${q.type} · ${q.topic}</span>
      </div>
      <div class="stem">${escapeHtml(q.stem)}</div>
      <div class="options">${optionsHtml}</div>
      ${feedbackHtml}
      <div class="nav">
        <button onclick="prevQuestion()" ${idx === 0 ? 'disabled' : ''}>← Previous</button>
        <button class="primary" id="nextBtn" ${nextDisabled} onclick="handleNext()">${nextLabel}</button>
      </div>
    </div>
  `;

  updateProgress();
}

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function selectOption(qid, optIdx) {
  if (locked[qid]) return;
  answers[qid] = optIdx;
  showQuestion(currentIdx);
}

function handleNext() {
  const q = QUESTIONS[currentIdx];
  if (!locked[q.id]) {
    if (answers[q.id] === undefined) return;
    locked[q.id] = true;
    showQuestion(currentIdx);
    return;
  }
  if (currentIdx === QUESTIONS.length - 1) {
    showResults();
  } else {
    showQuestion(currentIdx + 1);
  }
}

function prevQuestion() {
  if (currentIdx > 0) showQuestion(currentIdx - 1);
}

function updateProgress() {
  const total = QUESTIONS.length;
  const answered = Object.keys(locked).length;
  const score = QUESTIONS.filter(q => locked[q.id] && answers[q.id] === q.answer).length;
  document.getElementById('progressText').textContent = `Question ${currentIdx + 1} of ${total}`;
  document.getElementById('progressFill').style.width = ((currentIdx + 1) / total * 100) + '%';
  document.getElementById('scoreText').textContent = `Score: ${score}/${answered}`;
}

function showResults() {
  document.getElementById('quizArea').style.display = 'none';
  document.getElementById('progressWrap').style.display = 'none';
  const results = document.getElementById('results');
  results.classList.add('show');

  const score = QUESTIONS.filter(q => answers[q.id] === q.answer).length;
  const pct = Math.round(score / QUESTIONS.length * 100);

  document.getElementById('finalScore').textContent = `${score} / ${QUESTIONS.length}`;
  document.getElementById('finalPercent').textContent = `${pct}%`;

  let verdict = '';
  if (pct >= 80) verdict = "Strong baseline. Your reading time can be focused on areas where you missed questions — you're already in good shape.";
  else if (pct >= 65) verdict = "Solid foundation, but several gaps to close. Focus on the weakest topic areas below over your study plan.";
  else if (pct >= 50) verdict = "You have some intuition but key concepts need work. Prioritize the topic areas where you scored lowest — they will dominate your study time.";
  else verdict = "This is normal before any prep. The diagnostic has done its job by showing where to focus. The 15-20 hour plan is designed for exactly this starting point.";
  document.getElementById('verdictText').textContent = verdict;

  // Breakdown by type
  const typeStats = {};
  const topicStats = {};
  QUESTIONS.forEach(q => {
    const correct = answers[q.id] === q.answer;
    typeStats[q.type] = typeStats[q.type] || { correct: 0, total: 0 };
    typeStats[q.type].total++;
    if (correct) typeStats[q.type].correct++;

    // simpler topic grouping
    let group = q.topic;
    if (group.startsWith('Ethics')) group = 'Ethics';
    else if (group.startsWith('Law')) group = 'Law';
    else if (group.startsWith('Professional')) group = 'Professional Practice';

    topicStats[group] = topicStats[group] || { correct: 0, total: 0 };
    topicStats[group].total++;
    if (correct) topicStats[group].correct++;
  });

  function renderBreakdown(stats, elId) {
    const el = document.getElementById(elId);
    const rows = Object.entries(stats).sort((a, b) => (b[1].correct/b[1].total) - (a[1].correct/a[1].total));
    el.innerHTML = rows.map(([name, s]) => {
      const p = s.correct / s.total;
      const cls = p >= 0.75 ? 'good' : p >= 0.5 ? 'mid' : 'weak';
      return `<div class="breakdown-row">
        <span class="label">${escapeHtml(name)}</span>
        <span class="score ${cls}">${s.correct} / ${s.total}</span>
      </div>`;
    }).join('');
  }
  renderBreakdown(typeStats, 'typeBreakdown');
  renderBreakdown(topicStats, 'topicBreakdown');

  results.scrollIntoView({ behavior: 'smooth' });
}

// Initial render
showQuestion(0);
</script>
</body>
</html>
