<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NPPE Mini-Quiz: Negligence vs Professional Misconduct</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root {
    --bg: #f4f1ea;
    --paper: #fffdf7;
    --ink: #1a1a1a;
    --ink-soft: #555;
    --accent: #8b3a3a;       /* deep burgundy */
    --accent-soft: #c9a47a;  /* warm tan */
    --line: #d8d1c0;
    --back-bg: #faf3e0;
    --shadow: rgba(60, 40, 20, 0.12);
    --shadow-deep: rgba(60, 40, 20, 0.22);
    --correct: #2d6a2f;
    --correct-bg: #e6f0e2;
    --wrong: #a33;
    --wrong-bg: #f5e2e2;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { min-height: 100%; }
  body {
    background: var(--bg);
    background-image:
      radial-gradient(circle at 20% 30%, rgba(139, 58, 58, 0.04), transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(201, 164, 122, 0.06), transparent 50%);
    color: var(--ink);
    font-family: Georgia, 'Iowan Old Style', serif;
    padding: 24px 16px 60px;
    line-height: 1.5;
  }

  header {
    max-width: 760px;
    margin: 0 auto 16px;
    text-align: center;
  }
  h1 {
    font-family: 'Iowan Old Style', Georgia, serif;
    font-size: clamp(26px, 5vw, 38px);
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 4px;
  }
  h1 .accent { color: var(--accent); font-style: italic; }
  .subtitle {
    color: var(--ink-soft);
    font-size: 13px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .container {
    max-width: 760px;
    margin: 0 auto;
  }

  /* Progress */
  .progress-wrap {
    margin: 16px 0;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 1px 3px var(--shadow);
  }
  .progress-text {
    font-size: 13px;
    color: var(--ink-soft);
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }
  .progress-bar {
    flex: 1;
    height: 6px;
    background: var(--line);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.3s ease;
    width: 0;
  }

  /* Question card */
  .question {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 28px 32px;
    box-shadow:
      0 1px 2px var(--shadow),
      0 12px 28px -8px var(--shadow-deep);
    margin-bottom: 16px;
  }
  @media (max-width: 600px) {
    .question { padding: 20px 18px; }
  }

  .qmeta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .qnumber {
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
  }
  .qtype {
    font-size: 11px;
    letter-spacing: 0.5px;
    color: var(--ink-soft);
    font-style: italic;
  }

  .stem {
    font-size: clamp(15px, 2vw, 17px);
    font-weight: 500;
    line-height: 1.55;
    color: var(--ink);
    margin-bottom: 20px;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .option {
    display: flex;
    align-items: flex-start;
    padding: 12px 14px;
    border: 1px solid var(--line);
    border-radius: 4px;
    background: var(--paper);
    cursor: pointer;
    transition: all 0.15s ease;
    font-size: clamp(14px, 1.9vw, 15px);
    line-height: 1.5;
  }
  .option:hover:not(.locked) {
    border-color: var(--accent);
    background: #faf6ee;
  }
  .option-letter {
    font-weight: 700;
    color: var(--accent);
    margin-right: 12px;
    min-width: 20px;
    font-family: Georgia, serif;
  }
  .option.selected {
    border-color: var(--accent);
    background: #faf6ee;
  }
  .option.correct {
    border-color: var(--correct);
    background: var(--correct-bg);
  }
  .option.correct .option-letter { color: var(--correct); }
  .option.wrong {
    border-color: var(--wrong);
    background: var(--wrong-bg);
  }
  .option.wrong .option-letter { color: var(--wrong); }
  .option.locked { cursor: default; }
  .option.locked.dimmed { opacity: 0.55; }

  .feedback {
    margin-top: 18px;
    padding: 14px 16px;
    border-radius: 4px;
    border-left: 3px solid var(--accent);
    background: var(--back-bg);
    font-size: clamp(13px, 1.7vw, 14px);
    line-height: 1.55;
    white-space: pre-wrap;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback .verdict {
    font-weight: 700;
    margin-bottom: 8px;
    font-family: Georgia, serif;
    font-size: 14px;
    letter-spacing: 0.3px;
  }
  .feedback.correct { border-left-color: var(--correct); background: var(--correct-bg); }
  .feedback.correct .verdict { color: var(--correct); }
  .feedback.wrong { border-left-color: var(--wrong); background: var(--wrong-bg); }
  .feedback.wrong .verdict { color: var(--wrong); }

  /* Navigation */
  .nav {
    display: flex;
    gap: 10px;
    justify-content: space-between;
    align-items: center;
    margin-top: 20px;
    flex-wrap: wrap;
  }
  button {
    font-family: inherit;
    font-size: 14px;
    padding: 10px 18px;
    border: 1px solid var(--line);
    background: var(--paper);
    color: var(--ink);
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s ease;
    font-weight: 600;
  }
  button:hover:not(:disabled) {
    border-color: var(--accent);
    color: var(--accent);
  }
  button.primary {
    background: var(--accent);
    color: var(--paper);
    border-color: var(--accent);
  }
  button.primary:hover:not(:disabled) {
    background: #6e2d2d;
    color: var(--paper);
  }
  button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  /* Results */
  .results {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 32px;
    box-shadow:
      0 1px 2px var(--shadow),
      0 12px 28px -8px var(--shadow-deep);
    text-align: center;
    display: none;
  }
  .results.show { display: block; }
  .score-big {
    font-size: clamp(48px, 10vw, 72px);
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
    font-family: 'Iowan Old Style', Georgia, serif;
  }
  .score-label {
    font-size: 14px;
    color: var(--ink-soft);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 4px;
    margin-bottom: 24px;
  }
  .verdict-text {
    font-size: 16px;
    font-style: italic;
    color: var(--ink);
    margin-bottom: 24px;
    line-height: 1.6;
  }
  .breakdown {
    text-align: left;
    margin: 24px 0;
    padding: 20px;
    background: var(--back-bg);
    border-radius: 4px;
  }
  .breakdown h3 {
    font-size: 13px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
    font-weight: 600;
  }
  .breakdown-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    font-size: 14px;
    border-bottom: 1px solid var(--line);
  }
  .breakdown-row:last-child { border-bottom: none; }
  .breakdown-row .label { color: var(--ink-soft); }
  .breakdown-row .score {
    font-variant-numeric: tabular-nums;
    font-weight: 600;
  }
  .breakdown-row .score.good { color: var(--correct); }
  .breakdown-row .score.mid { color: #b08400; }
  .breakdown-row .score.weak { color: var(--wrong); }

  .review-link {
    display: inline-block;
    margin-top: 16px;
    color: var(--accent);
    text-decoration: underline;
    cursor: pointer;
    font-size: 14px;
  }
</style>
</head>
<body>

<header>
  <h1>NPPE <span class="accent">Mini-Quiz</span></h1>
  <p class="subtitle">Negligence vs Professional Misconduct · 5 questions · ~7 min</p>
</header>

<div class="container">

  <div class="progress-wrap" id="progressWrap">
    <span class="progress-text" id="progressText">Question 1 of 5</span>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <span class="progress-text" id="scoreText">Score: 0</span>
  </div>

  <div id="quizArea"></div>

  <div class="results" id="results">
    <div class="score-big" id="finalScore">0/15</div>
    <div class="score-label" id="finalPercent">0%</div>
    <div class="verdict-text" id="verdictText"></div>

    <div class="breakdown">
      <h3>Performance by Question Type</h3>
      <div id="typeBreakdown"></div>
    </div>

    <div class="breakdown">
      <h3>Performance by Topic Area</h3>
      <div id="topicBreakdown"></div>
    </div>

    <div style="margin-top: 24px;">
      <button class="primary" onclick="location.reload()">Take Quiz Again</button>
      <button onclick="document.getElementById('results').classList.remove('show'); document.getElementById('quizArea').style.display='block'; document.getElementById('progressWrap').style.display='flex'; showQuestion(0);">Review Answers</button>
    </div>
  </div>

</div>

<script id="dataScript" type="application/json">{"questions": [{"id": 1, "type": "Direct distinction", "topic": "Negligence vs Misconduct", "stem": "Which of the following statements BEST describes the difference between professional negligence and professional misconduct?", "options": ["They are different terms for the same concept — both refer to violations of the Code of Ethics.", "Negligence is decided by a civil court and requires proof of damages; professional misconduct is decided by the regulator and does not necessarily require harm.", "Negligence requires intent to harm; professional misconduct does not.", "Negligence is only relevant for criminal matters; professional misconduct is only relevant for civil matters."], "answer": 1, "explanation": "NEGLIGENCE is a civil tort decided in court. The plaintiff must prove all four elements — duty, breach, causation, AND damages — on the balance of probabilities. Without actual harm, there is no negligence claim.\n\nPROFESSIONAL MISCONDUCT is a regulatory matter under the PE Act (Regulation 941 in Ontario). The regulator (PEO) brings the case before its Discipline Committee. Misconduct does NOT require anyone to have actually been harmed — unsafe conduct, sealing work you didn't review, or working outside competence are all misconduct even if no incident occurred.\n\nA is wrong — they are distinct legal concepts.\nC is wrong — neither requires intent. Both are about failing to meet a standard.\nD is wrong — negligence is CIVIL law, not criminal. Misconduct is REGULATORY, not civil."}, {"id": 2, "type": "Both apply", "topic": "Negligence vs Misconduct", "stem": "A structural engineer fails to check a critical load calculation. A pedestrian walkway designed by the engineer subsequently collapses, injuring three people. Which of the following accurately describes the engineer's potential legal exposure?", "options": ["Only a civil negligence lawsuit by the injured parties.", "Only a professional misconduct investigation by PEO.", "Both a civil negligence lawsuit AND a separate professional misconduct investigation — these proceed independently.", "A criminal charge, which absorbs both negligence and misconduct."], "answer": 2, "explanation": "The SAME ACT can trigger BOTH proceedings, which run on parallel tracks:\n\nCIVIL NEGLIGENCE — injured parties (and possibly the owner) sue in civil court for damages. They must prove duty, breach, causation, and damages. If successful, the engineer (and likely their employer / insurer) pays damages.\n\nPROFESSIONAL MISCONDUCT — PEO opens its own investigation independent of the lawsuit. The Discipline Committee can suspend, restrict, or revoke the engineer's licence regardless of how the lawsuit turns out. Possible outcomes are independent — you could lose the lawsuit and not be disciplined, win the lawsuit and still be disciplined, lose both, or win both.\n\nD is wrong — criminal liability is rare for engineering work and is a separate track from both civil and regulatory matters. It would not 'absorb' the other proceedings."}, {"id": 3, "type": "Misconduct without harm", "topic": "Plan Stamping", "stem": "An engineer signs and seals a set of structural drawings prepared by an unlicensed friend, without reviewing them in any detail. The building is constructed and performs perfectly — nobody is harmed and the client is satisfied. Has the engineer engaged in negligence, professional misconduct, both, or neither?", "options": ["Neither — no one was harmed, so there is no wrongdoing.", "Negligence only — the engineer failed to meet the standard of care.", "Professional misconduct only — the engineer can be disciplined regardless of outcome, because no one was actually harmed.", "Both negligence and professional misconduct."], "answer": 2, "explanation": "This is a CLASSIC misconduct-only scenario. Plan stamping (sealing work you didn't prepare or thoroughly review) is explicitly listed in Regulation 941 as professional misconduct. PEO can discipline the engineer regardless of whether the building stood up or fell down — the breach is in the conduct itself, not in the outcome.\n\nWhy NOT negligence? Negligence requires DAMAGES — actual measurable harm to someone. The facts say nobody was harmed, the client is satisfied, the building performs perfectly. Without damages, no negligence claim can succeed.\n\nThis is one of the most important NPPE patterns: misconduct DOES NOT require harm; negligence DOES require harm. Plan stamping, working outside competence, failure to disclose a COI, and breach of the Code can all be disciplined even if everything turned out fine.\n\nA is wrong — outcome doesn't excuse the conduct. The seal is a declaration of professional responsibility; making that declaration falsely is misconduct.\nB and D are wrong — no harm means no negligence."}, {"id": 4, "type": "Elements of negligence", "topic": "Damages requirement", "stem": "An engineer makes a serious calculation error in a building design. The error is discovered by a colleague during peer review BEFORE construction begins, and is corrected at no additional cost. The building is then constructed without incident. Which element of negligence is MISSING that would prevent the client from successfully suing the engineer for negligence?", "options": ["Duty of care — the engineer owed no duty because the error was caught by someone else.", "Breach of the standard of care — the engineer met the standard because the error was eventually corrected.", "Causation — the engineer's error did not actually cause anything to happen.", "Damages — the client suffered no measurable loss because the error was caught in time."], "answer": 3, "explanation": "All four elements of negligence must be present for a successful claim: DUTY → BREACH → CAUSATION → DAMAGES.\n\nHere:\n• DUTY existed (engineer-client relationship). ✓\n• BREACH occurred — the engineer fell below the standard of care by making a serious calculation error. Peer review caught it, but the breach happened. ✓\n• CAUSATION — debatable, but the analysis usually focuses on damages.\n• DAMAGES — MISSING. The error was caught before construction; the client suffered no loss.\n\nNo damages = no negligence claim, even where the engineer clearly fell short of the standard. This is why professional QA processes (peer review, checking) are so important — they catch breaches BEFORE they ripen into damages.\n\nNote: this engineer might still face professional misconduct concerns if the breach was serious enough — but those are separate from negligence and don't require damages.\n\nA is wrong — the duty existed regardless of who caught the error.\nB is wrong — correction doesn't retroactively cure the original breach.\nC is wrong — causation is about whether the breach caused damages IF damages existed; the more fundamental issue is that no damages occurred at all."}, {"id": 5, "type": "Procedure and consequences", "topic": "Burden of proof and outcomes", "stem": "Which of the following is TRUE about the procedural differences between a civil negligence claim and a professional misconduct proceeding against an engineer?", "options": ["Both are decided by the same body — the courts — using the same standards of proof.", "Negligence requires proof beyond a reasonable doubt; misconduct requires proof on the balance of probabilities.", "Negligence is decided by a court on the balance of probabilities; misconduct is decided by the regulator's Discipline Committee on a clear and convincing evidence standard.", "Both proceedings can result in fines, but only misconduct can affect the engineer's licence."], "answer": 2, "explanation": "The two proceedings are decided in completely different forums under different standards:\n\nNEGLIGENCE:\n• Decided by: a civil court (judge)\n• Standard of proof: BALANCE OF PROBABILITIES (>50% likely)\n• Brought by: the injured plaintiff\n• Remedy: damages ($) or, rarely, injunction / specific performance\n\nPROFESSIONAL MISCONDUCT:\n• Decided by: PEO's Discipline Committee (an administrative tribunal)\n• Standard of proof: CLEAR AND CONVINCING EVIDENCE (higher than civil but lower than criminal beyond-reasonable-doubt)\n• Brought by: the regulator (PEO)\n• Remedy: reprimand, fines, restrictions, suspension, revocation of licence\n\nA is wrong — they are decided by different bodies (court vs. regulator).\nB is wrong — beyond reasonable doubt is the CRIMINAL standard, used in neither of these.\nD is partially right (both can result in fines, and only misconduct directly affects the licence) — but it ignores the procedural differences and the different decision-makers, which is what the question asks about."}]}</script>

<script>
const DATA = JSON.parse(document.getElementById('dataScript').textContent);
const QUESTIONS = DATA.questions;
const LETTERS = ['A', 'B', 'C', 'D'];

let currentIdx = 0;
let answers = {};  // qid -> selected option index
let locked = {};   // qid -> true if answered & feedback shown

function showQuestion(idx) {
  currentIdx = idx;
  const q = QUESTIONS[idx];
  const area = document.getElementById('quizArea');

  const userAnswer = answers[q.id];
  const isLocked = locked[q.id];

  let optionsHtml = '';
  q.options.forEach((text, i) => {
    let classes = 'option';
    if (isLocked) {
      classes += ' locked';
      if (i === q.answer) classes += ' correct';
      else if (i === userAnswer) classes += ' wrong';
      else classes += ' dimmed';
    } else if (userAnswer === i) {
      classes += ' selected';
    }
    optionsHtml += `
      <div class="${classes}" onclick="selectOption(${q.id}, ${i})">
        <span class="option-letter">${LETTERS[i]}.</span>
        <span>${escapeHtml(text)}</span>
      </div>`;
  });

  let feedbackHtml = '';
  if (isLocked) {
    const correct = userAnswer === q.answer;
    feedbackHtml = `
      <div class="feedback ${correct ? 'correct' : 'wrong'} show">
        <div class="verdict">${correct ? '✓ Correct' : '✗ Not quite — the correct answer is ' + LETTERS[q.answer]}</div>
        <div>${escapeHtml(q.explanation).replace(/\n/g, '<br>')}</div>
      </div>`;
  }

  const isLast = idx === QUESTIONS.length - 1;
  const nextLabel = isLocked ? (isLast ? 'See Results →' : 'Next Question →') : 'Submit Answer';
  const nextDisabled = userAnswer === undefined ? 'disabled' : '';

  area.innerHTML = `
    <div class="question">
      <div class="qmeta">
        <span class="qnumber">Question ${idx + 1}</span>
        <span class="qtype">${q.type} · ${q.topic}</span>
      </div>
      <div class="stem">${escapeHtml(q.stem)}</div>
      <div class="options">${optionsHtml}</div>
      ${feedbackHtml}
      <div class="nav">
        <button onclick="prevQuestion()" ${idx === 0 ? 'disabled' : ''}>← Previous</button>
        <button class="primary" id="nextBtn" ${nextDisabled} onclick="handleNext()">${nextLabel}</button>
      </div>
    </div>
  `;

  updateProgress();
}

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function selectOption(qid, optIdx) {
  if (locked[qid]) return;
  answers[qid] = optIdx;
  showQuestion(currentIdx);
}

function handleNext() {
  const q = QUESTIONS[currentIdx];
  if (!locked[q.id]) {
    if (answers[q.id] === undefined) return;
    locked[q.id] = true;
    showQuestion(currentIdx);
    return;
  }
  if (currentIdx === QUESTIONS.length - 1) {
    showResults();
  } else {
    showQuestion(currentIdx + 1);
  }
}

function prevQuestion() {
  if (currentIdx > 0) showQuestion(currentIdx - 1);
}

function updateProgress() {
  const total = QUESTIONS.length;
  const answered = Object.keys(locked).length;
  const score = QUESTIONS.filter(q => locked[q.id] && answers[q.id] === q.answer).length;
  document.getElementById('progressText').textContent = `Question ${currentIdx + 1} of ${total}`;
  document.getElementById('progressFill').style.width = ((currentIdx + 1) / total * 100) + '%';
  document.getElementById('scoreText').textContent = `Score: ${score}/${answered}`;
}

function showResults() {
  document.getElementById('quizArea').style.display = 'none';
  document.getElementById('progressWrap').style.display = 'none';
  const results = document.getElementById('results');
  results.classList.add('show');

  const score = QUESTIONS.filter(q => answers[q.id] === q.answer).length;
  const pct = Math.round(score / QUESTIONS.length * 100);

  document.getElementById('finalScore').textContent = `${score} / ${QUESTIONS.length}`;
  document.getElementById('finalPercent').textContent = `${pct}%`;

  let verdict = '';
  if (pct >= 80) verdict = "Strong baseline. Your reading time can be focused on areas where you missed questions — you're already in good shape.";
  else if (pct >= 65) verdict = "Solid foundation, but several gaps to close. Focus on the weakest topic areas below over your study plan.";
  else if (pct >= 50) verdict = "You have some intuition but key concepts need work. Prioritize the topic areas where you scored lowest — they will dominate your study time.";
  else verdict = "This is normal before any prep. The diagnostic has done its job by showing where to focus. The 15-20 hour plan is designed for exactly this starting point.";
  document.getElementById('verdictText').textContent = verdict;

  // Breakdown by type
  const typeStats = {};
  const topicStats = {};
  QUESTIONS.forEach(q => {
    const correct = answers[q.id] === q.answer;
    typeStats[q.type] = typeStats[q.type] || { correct: 0, total: 0 };
    typeStats[q.type].total++;
    if (correct) typeStats[q.type].correct++;

    // simpler topic grouping
    let group = q.topic;
    if (group.startsWith('Ethics')) group = 'Ethics';
    else if (group.startsWith('Law')) group = 'Law';
    else if (group.startsWith('Professional')) group = 'Professional Practice';

    topicStats[group] = topicStats[group] || { correct: 0, total: 0 };
    topicStats[group].total++;
    if (correct) topicStats[group].correct++;
  });

  function renderBreakdown(stats, elId) {
    const el = document.getElementById(elId);
    const rows = Object.entries(stats).sort((a, b) => (b[1].correct/b[1].total) - (a[1].correct/a[1].total));
    el.innerHTML = rows.map(([name, s]) => {
      const p = s.correct / s.total;
      const cls = p >= 0.75 ? 'good' : p >= 0.5 ? 'mid' : 'weak';
      return `<div class="breakdown-row">
        <span class="label">${escapeHtml(name)}</span>
        <span class="score ${cls}">${s.correct} / ${s.total}</span>
      </div>`;
    }).join('');
  }
  renderBreakdown(typeStats, 'typeBreakdown');
  renderBreakdown(topicStats, 'topicBreakdown');

  results.scrollIntoView({ behavior: 'smooth' });
}

// Initial render
showQuestion(0);
</script>
</body>
</html>
